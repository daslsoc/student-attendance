; fpm-pool.conf
; Overrides the default PHP-FPM pool settings for the dev container.

[www]
user = www-data
group = www-data

listen = 9000

; Dynamic process management.
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 4
pm.max_requests = 500

; Route worker output to the container log.
access.log = /proc/self/fd/2
catch_workers_output = yes
