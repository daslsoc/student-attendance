# Dev-only stack (production is a shared server — see docs/deployment.md).
#
# Container names are intentionally NOT pinned and the DB port is NOT published
# to the host, so this stack coexists with the sibling Laravel projects on this
# machine (which also run MySQL). Compose namespaces containers as
# `student-attendance-<service>-1`. Reach MySQL from the app over the network as
# host `db`; use `make mysql` for a client.
services:
  # PHP-FPM application container (PHP 8.2 + Xdebug coverage, Composer baked in).
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: attendance_db
      DB_USERNAME: root
      DB_PASSWORD: secret
    depends_on:
      - db
    networks:
      - attendance_net

  # Nginx — serves public/ for browser/Dusk runs. No host port published by
  # default to avoid colliding with the other projects' port 80.
  nginx:
    image: nginx:latest
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./docker/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - attendance_net

  # MySQL (prod parity). No host port binding — tests and the app reach it on
  # the internal network as `db`.
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: attendance_db
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - attendance_net

volumes:
  db_data:

networks:
  attendance_net:
    driver: bridge
